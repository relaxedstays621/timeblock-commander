services:
  db:
    image: postgres:16-alpine
    container_name: timeblock-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: timeblock
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: timeblock
    volumes:
      - timeblock_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeblock"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - timeblock-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timeblock-app
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgresql://timeblock:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/timeblock?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL must be set in .env}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:-}
      PORT: 3100
      TZ: America/New_York
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - timeblock-net

volumes:
  timeblock_pgdata:
    name: timeblock_pgdata

networks:
  timeblock-net:
    name: timeblock-net
    driver: bridge
